services:
  aion-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: aion-bot:latest
    container_name: aion-bot
    restart: unless-stopped

    # .env 파일에서 DISCORD_TOKEN, CLIENT_ID, (선택) GUILD_ID 주입
    env_file:
      - .env

    environment:
      NODE_ENV: production
      TZ: Asia/Seoul
      DB_PATH: /app/data/aion_bot.db

    # SQLite 파일(WAL 파일 포함) 영속화. 호스트의 ./data 에 보관.
    volumes:
      - ./data:/app/data

    # 컨테이너 로그 회전 (호스트 디스크 보호)
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # 외부 포트 노출 없음 (봇은 outbound 만 사용)

    # 간단한 헬스체크: node 프로세스 존재 확인
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node src/index.js' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
