# ──────────────────────────────────────────────────────────────
# docker-compose.prod.yml — 서버용 (빌드 없이 이미지만 사용)
#
# 기본 설정: GHCR (GitHub Container Registry) 경유 배포
#   로컬:  docker compose build
#          docker tag aion-bot:latest ghcr.io/taeheelim/aion-bot:latest
#          docker push ghcr.io/taeheelim/aion-bot:latest
#   서버:  docker compose -f docker-compose.prod.yml pull
#          docker compose -f docker-compose.prod.yml up -d
#
# 만약 레지스트리 없이 tar-load 방식으로 배포한다면 아래 image / pull_policy 를
# 주석에 표시된 대체값으로 바꾸세요.
# ──────────────────────────────────────────────────────────────

services:
  aion-bot:
    # GHCR (기본). public 패키지면 별도 로그인 없이 서버에서 pull 가능.
    image: ghcr.io/taeheelim/aion-bot:latest
    # ↳ tar-load 방식으로 바꿀 때:  image: aion-bot:latest

    container_name: aion-bot
    restart: unless-stopped

    # GHCR 사용 시 매 up/pull 마다 최신 이미지 받아오기.
    pull_policy: always
    # ↳ tar-load 방식으로 바꿀 때:  pull_policy: never

    env_file:
      - .env

    environment:
      NODE_ENV: production
      TZ: Asia/Seoul
      DB_PATH: /app/data/aion_bot.db

    volumes:
      # Named volume (Docker 관리). 컨테이너 안의 node 사용자 권한 자동 상속 → chown 불필요.
      # 백업: docker run --rm -v aion-bot_aion-data:/d -v $(pwd):/backup alpine \
      #         tar czf /backup/aion-data-$(date +%F).tgz -C /d .
      - aion-data:/app/data

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    healthcheck:
      # node:22-slim 에는 pgrep 가 없으므로 procfs 의 cmdline 을 직접 검사.
      # 컨테이너가 node 유저로 떠도 /proc/<own-pid>/cmdline 은 읽을 수 있다.
      test: ["CMD-SHELL", "grep -aq 'src/index.js' /proc/[0-9]*/cmdline 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  aion-data:
    # Docker 가 관리. 호스트의 /var/lib/docker/volumes/aion-bot_aion-data/_data 등에 보관됨.
    # 컨테이너 내부 /app/data 의 소유자(node:node)를 그대로 유지 → 권한 문제 없음.
